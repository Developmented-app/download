    <style>

</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Background Glow -->
    <div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-500/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-cyan-500/10 blur-[120px] rounded-full"></div>
    </div>

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12 space-y-4">
            <div class="inline-flex items-center gap-2 px-4 py-1 bg-indigo-500/10 border border-indigo-500/20 rounded-full text-indigo-400 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-bolt"></i> v2.0 Ultra
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold text-white">
                Media<span class="gradient-text">Harvest</span>
            </h1>
            <p class="text-slate-400 max-w-xl mx-auto">ទាញយករូបភាព និងវីដេអូពីគ្រប់គេហទំព័រ Portfolio ក្នុងឯកសារ HTML តែមួយ។</p>
        </header>

        <!-- Search Box -->
        <div class="glass-panel rounded-[2rem] p-6 md:p-10 shadow-2xl mb-10">
            <div class="space-y-6">
                <div class="relative">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="text" id="urlInput" placeholder="បិទភ្ជាប់តំណភ្ជាប់ (URL) នៅទីនេះ..." 
                           class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-2xl py-5 pl-14 pr-6 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all text-lg">
                </div>

                <div class="flex flex-col md:flex-row gap-4 items-center">
                    <div class="flex bg-slate-900/80 p-1.5 rounded-2xl border border-slate-700/50 w-full md:w-auto">
                        <button onclick="setMediaType('images')" id="btnImages" class="media-type-btn flex-1 px-6 py-3 rounded-xl transition-all text-slate-400 hover:text-white">
                            <i class="fas fa-image mr-2"></i>រូបភាព
                        </button>
                        <button onclick="setMediaType('videos')" id="btnVideos" class="media-type-btn flex-1 px-6 py-3 rounded-xl transition-all text-slate-400 hover:text-white">
                            <i class="fas fa-video mr-2"></i>វីដេអូ
                        </button>
                        <button onclick="setMediaType('both')" id="btnBoth" class="media-type-btn flex-1 px-6 py-3 rounded-xl transition-all bg-indigo-600 text-white shadow-lg">
                            <i class="fas fa-layer-group mr-2"></i>ទាំងអស់
                        </button>
                    </div>

                    <div class="flex gap-3 w-full md:w-auto md:ml-auto">
                        <button onclick="clearAll()" class="flex-1 md:flex-none px-8 py-4 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-2xl transition-all">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                        <button onclick="startScraping()" id="mainBtn" class="flex-1 md:flex-none px-10 py-4 bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white font-bold rounded-2xl shadow-xl shadow-indigo-500/20 transition-all flex items-center justify-center gap-2">
                            <span id="btnText">ចាប់ផ្តើមស្វែងរក</span>
                            <div id="btnLoader" class="loader hidden"></div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Info Bar -->
        <div id="infoBar" class="hidden mb-8 p-6 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <i class="fas fa-check-circle text-emerald-400 text-2xl"></i>
                <div>
                    <h3 class="text-white font-bold">ស្វែងរកជោគជ័យ!</h3>
                    <p id="statsText" class="text-slate-400 text-sm"></p>
                </div>
            </div>
            <button onclick="downloadAll()" class="w-full md:w-auto px-6 py-3 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold rounded-xl transition-all">
                <i class="fas fa-download mr-2"></i>ទាញយកទាំងអស់
            </button>
        </div>

        <!-- Error Bar -->
        <div id="errorBar" class="hidden mb-8 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl flex items-center gap-3 text-red-400">
            <i class="fas fa-exclamation-triangle"></i>
            <p id="errorText"></p>
        </div>

        <!-- Results Grid -->
        <div id="videoResults" class="mb-12 hidden">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3 text-cyan-400"><i class="fas fa-play-circle"></i> វីដេអូ</h2>
            <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="imageResults" class="hidden">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3 text-indigo-400"><i class="fas fa-th-large"></i> រូបភាព</h2>
            <div id="imageGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </div>
    </div>

    <script>
        let currentMediaType = 'both';
        let foundImages = [];
        let foundVideos = [];

        function setMediaType(type) {
            currentMediaType = type;
            document.querySelectorAll('.media-type-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-lg');
                btn.classList.add('text-slate-400');
            });
            const activeBtn = document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1));
            activeBtn.classList.add('bg-indigo-600', 'text-white', 'shadow-lg');
            activeBtn.classList.remove('text-slate-400');
        }

        async function startScraping() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return alert('សូមបញ្ចូល URL');

            // UI Loading State
            document.getElementById('btnText').textContent = 'កំពុងស្វែងរក...';
            document.getElementById('btnLoader').classList.remove('hidden');
            document.getElementById('mainBtn').disabled = true;
            document.getElementById('infoBar').classList.add('hidden');
            document.getElementById('errorBar').classList.add('hidden');

            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const html = data.contents;

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                const imageSet = new Set();
                const videoSet = new Set();

                // Scrape Logic
                if (currentMediaType === 'images' || currentMediaType === 'both') {
                    doc.querySelectorAll('img').forEach(img => {
                        let src = img.src || img.getAttribute('data-src') || img.getAttribute('srcset');
                        if (src && !src.startsWith('data:')) imageSet.add(resolve(url, src));
                    });
                }

                if (currentMediaType === 'videos' || currentMediaType === 'both') {
                    doc.querySelectorAll('video, source, iframe').forEach(vid => {
                        let src = vid.src || vid.getAttribute('src');
                        if (src) videoSet.add(resolve(url, src));
                    });
                }

                foundImages = Array.from(imageSet);
                foundVideos = Array.from(videoSet);

                displayResults();
            } catch (err) {
                document.getElementById('errorBar').classList.remove('hidden');
                document.getElementById('errorText').textContent = 'មិនអាចទាញយកបានទេ។ គេហទំព័រអាចបិទ CORS ឬ URL មិនត្រឹមត្រូវ។';
            } finally {
                document.getElementById('btnText').textContent = 'ចាប់ផ្តើមស្វែងរក';
                document.getElementById('btnLoader').classList.add('hidden');
                document.getElementById('mainBtn').disabled = false;
            }
        }

        function resolve(base, relative) {
            try { return new URL(relative, base).href; } catch(e) { return null; }
        }

        function displayResults() {
            const imageGrid = document.getElementById('imageGrid');
            const videoGrid = document.getElementById('videoGrid');
            imageGrid.innerHTML = '';
            videoGrid.innerHTML = '';

            if (foundImages.length > 0) {
                document.getElementById('imageResults').classList.remove('hidden');
                foundImages.forEach((img, i) => {
                    const card = document.createElement('div');
                    card.className = 'media-card relative aspect-square bg-slate-800 rounded-2xl overflow-hidden border border-slate-700/50 group';
                    card.innerHTML = `
                        <img src="https://api.allorigins.win/raw?url=${encodeURIComponent(img)}" class="w-full h-full object-cover transition-all duration-500" loading="lazy">
                        <div class="absolute inset-0 bg-slate-900/60 opacity-0 group-hover:opacity-100 transition-all flex items-end p-2">
                            <button onclick="downloadOne('${img}', 'image', ${i})" class="w-full bg-indigo-500 py-1.5 rounded-lg text-[10px] font-bold">ទាញយក</button>
                        </div>
                    `;
                    imageGrid.appendChild(card);
                });
            }

            if (foundVideos.length > 0) {
                document.getElementById('videoResults').classList.remove('hidden');
                foundVideos.forEach((vid, i) => {
                    const card = document.createElement('div');
                    card.className = 'bg-slate-800 border border-slate-700/50 rounded-2xl overflow-hidden p-3';
                    card.innerHTML = `
                        <div class="aspect-video bg-black rounded-xl mb-3 flex items-center justify-center text-xs text-slate-500 overflow-hidden">
                            ${vid.includes('youtube') ? 'YouTube Embed' : `<video src="${vid}" class="w-full h-full" controls></video>`}
                        </div>
                        <button onclick="downloadOne('${vid}', 'video', ${i})" class="w-full bg-slate-700 py-2 rounded-xl text-xs">ទាញយក</button>
                    `;
                    videoGrid.appendChild(card);
                });
            }

            if (foundImages.length || foundVideos.length) {
                document.getElementById('infoBar').classList.remove('hidden');
                document.getElementById('statsText').textContent = `រកឃើញរូបភាព ${foundImages.length} និងវីដេអូ ${foundVideos.length}`;
            }
        }

        async function downloadOne(url, type, i) {
            try {
                const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `media_${type}_${i+1}`;
                a.click();
            } catch(e) { window.open(url, '_blank'); }
        }

        async function downloadAll() {
            for(let i=0; i<foundImages.length; i++) {
                await downloadOne(foundImages[i], 'image', i);
                await new Promise(r => setTimeout(r, 500));
            }
            for(let i=0; i<foundVideos.length; i++) {
                await downloadOne(foundVideos[i], 'video', i);
                await new Promise(r => setTimeout(r, 500));
            }
        }

        function clearAll() {
            document.getElementById('urlInput').value = '';
            document.getElementById('imageResults').classList.add('hidden');
            document.getElementById('videoResults').classList.add('hidden');
            document.getElementById('infoBar').classList.add('hidden');
            foundImages = [];
            foundVideos = [];
        }
    </script>
</body>
</html>
